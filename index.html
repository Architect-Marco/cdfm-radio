<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SBN // MUSIC GEN CLOUD FORGE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background-color: #050505; color: #ffffff; font-family: 'Inter', sans-serif; overflow: hidden; }
        .noir-bezel { border: 1.8px solid rgba(255, 255, 255, 0.05); }
        .glow-purple:focus { box-shadow: 0 0 15px rgba(168, 85, 247, 0.2); border-color: #a855f7; }
        .scanline { background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%); background-size: 100% 4px; }
        .loading-bar { transition: width 0.5s ease-in-out; }
        .forge-active { animation: pulse-gold 2s infinite; }
        @keyframes pulse-gold {
            0% { border-color: rgba(168, 85, 247, 0.2); }
            50% { border-color: #d4af37; box-shadow: 0 0 20px rgba(212, 175, 55, 0.3); }
            100% { border-color: rgba(168, 85, 247, 0.2); }
        }
    </style>
</head>
<body class="h-screen flex items-center justify-center p-6">
    <div class="scanline absolute inset-0 pointer-events-none opacity-20"></div>

    <main class="w-full max-w-4xl relative z-10">
        <div class="mb-10 text-left">
            <h1 class="text-4xl font-black uppercase italic tracking-tighter text-white">Music Gen <span class="text-purple-500">Forge</span></h1>
            <p class="text-gray-500 text-[10px] uppercase tracking-[0.4em] font-black opacity-60">Engine: Hugging Face / MusicGen-Small / 0.00% Overhead</p>
        </div>

        <div id="main-container" class="noir-bezel bg-[#0a0a0a] rounded-2xl p-10 shadow-2xl transition-all duration-500">
            <div class="grid grid-cols-12 gap-10">
                <!-- PROMPT ENTRY -->
                <div class="col-span-8 space-y-6 text-left">
                    <div>
                        <label class="text-[9px] font-black text-gray-500 uppercase tracking-widest mb-3 block italic">// SONIC_BLUEPRINT_V7.2</label>
                        <textarea id="prompt" class="w-full h-48 bg-black noir-bezel rounded-xl p-6 text-sm text-gray-300 focus:outline-none glow-purple leading-relaxed resize-none" placeholder="e.g 528Hz Luxury Nu-Gaze, Lexi-Con Vocals, Industrial Atmosphere, 128 BPM..."></textarea>
                    </div>
                    <button onclick="igniteForge()" id="forge-btn" class="w-full py-4 bg-purple-600 text-white font-black uppercase italic tracking-[0.2em] rounded-xl hover:bg-purple-400 transition-colors duration-300 shadow-lg">Initiate Free-Forge ✨</button>
                </div>

                <!-- STATUS & RESULTS -->
                <div class="col-span-4 space-y-6">
                    <div id="status-card" class="bg-black/50 noir-bezel p-6 rounded-xl hidden">
                        <h4 class="text-[9px] font-black text-orange-500 mb-4 uppercase italic tracking-widest">Status</h4>
                        <div class="h-1 w-full bg-white/5 rounded-full overflow-hidden">
                            <div id="progress" class="h-full bg-orange-500 w-0 loading-bar"></div>
                        </div>
                        <p id="status-text" class="text-[8px] font-mono text-orange-500 mt-3 uppercase tracking-widest italic">Uplinking...</p>
                    </div>

                    <div id="result-card" class="bg-black/50 noir-bezel p-6 rounded-xl hidden">
                        <h4 class="text-[9px] font-black text-purple-500 mb-4 uppercase italic tracking-widest">Output Ready</h4>
                        <audio id="player" controls class="w-full h-8 opacity-70"></audio>
                        <a id="download-link" href="#" download="lexi-con-forge-528hz.wav" class="block text-center text-[9px] text-gray-500 mt-4 underline uppercase">Download Master</a>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // TOKEN UPLINKED - MARCO'S HF KEY
        const HF_TOKEN = "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"; 

        async function igniteForge() {
            const prompt = document.getElementById('prompt').value;
            const btn = document.getElementById('forge-btn');
            const statusCard = document.getElementById('status-card');
            const statusText = document.getElementById('status-text');
            const progress = document.getElementById('progress');
            const container = document.getElementById('main-container');

            if (!prompt) return alert("Architect, enter a blueprint first!");

            // UI TRIGGER
            btn.disabled = true;
            btn.innerText = "Processing...";
            statusCard.classList.remove('hidden');
            container.classList.add('forge-active');
            
            progress.style.width = "20%";
            statusText.innerText = "Uplinking to HF Inference...";

            try {
                // HF FREE INFERENCE CALL
                const response = await fetch(
                    "https://api-inference.huggingface.co/models/facebook/musicgen-small",
                    {
                        headers: { 
                            "Authorization": `Bearer ${HF_TOKEN}`,
                            "Content-Type": "application/json"
                        },
                        method: "POST",
                        body: JSON.stringify({ inputs: prompt }),
                    }
                );

                progress.style.width = "60%";
                statusText.innerText = "Forging 528Hz Harmonics...";

                if (!response.ok) {
                    const error = await response.json();
                    // Handle model loading/warming up
                    if (error.error && error.error.includes("currently loading")) {
                        statusText.innerText = "Model Warming Up... Retry in 20s.";
                        setTimeout(igniteForge, 20000);
                        return;
                    }
                    throw new Error(error.error || "HF Grid Congestion");
                }

                const blob = await response.blob();
                const audioUrl = URL.createObjectURL(blob);
                
                finalizeOutput(audioUrl);

            } catch (err) {
                console.error("FORGE ERROR:", err);
                alert(`Grid Connection Error: ${err.message}`);
                resetUI();
            }
        }

        function finalizeOutput(url) {
            document.getElementById('status-card').classList.add('hidden');
            document.getElementById('result-card').classList.remove('hidden');
            document.getElementById('main-container').classList.remove('forge-active');
            document.getElementById('player').src = url;
            document.getElementById('download-link').href = url;
            document.getElementById('forge-btn').disabled = false;
            document.getElementById('forge-btn').innerText = "Forge Another Hit ✨";
        }

        function resetUI() {
            document.getElementById('forge-btn').disabled = false;
            document.getElementById('forge-btn').innerText = "Initiate Free-Forge ✨";
            document.getElementById('status-card').classList.add('hidden');
            document.getElementById('main-container').classList.remove('forge-active');
        }
    </script>
</body>
</html>
