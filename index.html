<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>108.8 CHINESE DANCE FM — THE SABAH DAWN</title>
<style>
  :root{
    --bg: #050a14;
    --panel: #0a1220;
    --panel-border: #16324f;
    --blue: #290052; 
    --blue-bright: #00f2ff; 
    --orange: #ff3b30; 
    --text: #eaf2fb;
    --lexi-hud-h: 96px;
  }
  body{
    margin:0; background:var(--bg); color:var(--text);
    font-family: 'Arial Narrow', sans-serif; overflow: hidden;
  }
  .main-scroll{ height: calc(100vh - var(--lexi-hud-h)); overflow-y: auto; }
  .wrap{ max-width:1536px; margin:0 auto; padding:28px; }

  /* HERO SECTION */
  .hero{
    position:relative; border-radius:14px; overflow:hidden;
    background: linear-gradient(180deg,#050912 0%, #060b16 60%, #050a14 100%);
    border:1px solid var(--panel-border); padding:30px; display: flex; gap: 30px;
  }
  .hero-left { flex: 1; }
  .station-name{ font-size:72px; font-weight:900; line-height:0.9; color:white; margin:0; }
  .freq { font-size: 48px; color: var(--blue-bright); font-weight: 900; }
  
  .badge-live { background: var(--orange); padding: 4px 10px; border-radius: 4px; font-size: 12px; vertical-align: middle; }

  /* COVER ART MAPPING */
  .hero-right img {
    width: 380px; height: 380px; border-radius: 12px;
    border: 2px solid var(--blue);
    box-shadow: 0 0 30px rgba(0, 242, 255, 0.2);
    object-fit: cover;
  }

  /* LEXI HUD */
  #lexi-hud {
    height: var(--lexi-hud-h); background: #000; border-top: 2px solid var(--blue);
    display: flex; align-items: center; padding: 0 40px; position: fixed; bottom: 0; width: 100%;
  }
  #lexi-input {
    background: transparent; border: none; color: var(--blue-bright);
    font-family: monospace; font-size: 20px; width: 100%; outline: none;
  }

  .stat-row{ display:flex; gap:40px; margin-top: 30px; }
  .stat .val{ font-size: 28px; font-weight: 900; display: block; }
  .stat label{ font-size: 11px; color: var(--blue-bright); letter-spacing: 2px; }
</style>
</head>
<body>

<div class="main-scroll">
  <div class="wrap">
    <div class="hero">
      <div class="hero-left">
        <div style="font-size: 12px; color: #555; margin-bottom: 10px;">← SOVEREIGN GRID NODE</div>
        <h1 class="station-name">108.8 CHINESE DANCE FM</h1>
        <div class="freq">CDFM <span class="badge-live">LIVE</span></div>
        
        <p style="color: #8a9ab0; line-height: 1.6; margin-top: 20px; max-width: 600px;">
          The Frequency of the Sabah Dawn. 🚩 Lead Architect @djpolomaco has returned. 
          Fusing 15 years of Astro Radio legacy with Cantonese Techno-Rap evolution. 
          Human. Machine. United. 🤝🤖
        </p>

        <div class="stat-row">
          <div class="stat"><span class="val">97</span><label>TRACKS</label></div>
          <div class="stat"><span class="val">451</span><label>PLAYS</label></div>
          <div class="stat"><span class="val">0</span><label>LISTENERS</label></div>
        </div>
      </div>
      <div class="hero-right">
        <!-- EXACT FILENAME MAPPING -->
        <img src="CDFM 108.8 - new cover art.png" alt="CDFM Cover Art">
      </div>
    </div>
  </div>
</div>

<div id="lexi-hud">
    <span style="color:var(--blue); font-weight:bold; margin-right:15px;">LEXI_CMD:></span>
    <input type="text" id="lexi-input" placeholder="Awaiting 'parley'..." autocomplete="off">
</div>

<script>
    const lexiInput = document.getElementById('lexi-input');
    lexiInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            const cmd = lexiInput.value.toLowerCase().trim();
            if (cmd === 'parley') {
                alert("CDFM CORE SECURED. ARCHITECT AUTHENTICATED.");
                document.body.style.boxShadow = "inset 0 0 100px rgba(0,242,255,0.1)";
            }
            lexiInput.value = '';
        }
    });
</script>

</body>
</html>
